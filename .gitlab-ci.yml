stages:
  - build
  - fingerprint
  - cleanup

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

# ── Frontend ──────────────────────────────────────────────────────────────────

build-frontend:
  stage: build
  retry: 2
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE/frontend:latest || true
    - docker build
        --cache-from $CI_REGISTRY_IMAGE/frontend:latest
        --build-arg BUILDKIT_INLINE_CACHE=1
        --build-arg VITE_API_URL=https://typercut.noogoo.ch/api
        -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
        -t $CI_REGISTRY_IMAGE/frontend:latest
        frontend/
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "api"
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - frontend/**/*

# ── Backend ───────────────────────────────────────────────────────────────────

build-backend:
  stage: build
  retry: 1
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE/backend:latest || true
    - docker build
        --cache-from $CI_REGISTRY_IMAGE/backend:latest
        --build-arg BUILDKIT_INLINE_CACHE=1
        -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
        -t $CI_REGISTRY_IMAGE/backend:latest
        backend/
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "api"
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
  timeout: 2h

# ── Fingerprint ───────────────────────────────────────────────────────────────

fingerprint:
  stage: fingerprint
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker login -u gitlab+deploy-token-2 -p $NIGHTGLOW_REGISTRY_TOKEN registry.noogoo.ch
    - apk add --no-cache python3
  script:
    - docker pull registry.noogoo.ch/orderout/nightglow:latest
    - docker network create fpnet
    - docker run -d --name nightglow --network fpnet
        registry.noogoo.ch/orderout/nightglow:latest
        --headless --webdriver 7000 about:blank
    - NIGHTGLOW_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' nightglow)
    - echo "nightglow IP = $NIGHTGLOW_IP"
    - docker run --rm --network fpnet
        -v "$CI_PROJECT_DIR/tests/integration:/tests"
        python:3.12-slim
        python3 /tests/fingerprint.py --url "http://$NIGHTGLOW_IP:7000"
  after_script:
    - docker stop nightglow 2>/dev/null || true
    - docker rm   nightglow 2>/dev/null || true
    - docker network rm fpnet 2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true

# ── Registry cleanup ──────────────────────────────────────────────────────────

cleanup:
  stage: cleanup
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      REPOS=$(curl -sf --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories" | jq -r '.[].id')
      for REPO_ID in $REPOS; do
        STALE=$(curl -sf --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories/$REPO_ID/tags?per_page=100" | \
          jq -r '.[] | select(.name | test("^[0-9a-f]{8}$")) | .name')
        for TAG in $STALE; do
          curl -sf -X DELETE --header "PRIVATE-TOKEN: $GITLAB_CLEANUP_TOKEN" \
            "$CI_API_V4_URL/projects/$CI_PROJECT_ID/registry/repositories/$REPO_ID/tags/$TAG" || true
        done
      done
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  allow_failure: true
